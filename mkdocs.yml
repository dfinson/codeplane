site_name: CodePlane
site_description: Control plane for running and supervising coding agents
site_url: https://dfinson.github.io/codeplane
repo_url: https://github.com/dfinson/codeplane
repo_name: dfinson/codeplane

theme:
  name: material
  logo: images/mark.png
  favicon: images/mark.png
  palette:
    - scheme: slate
      primary: black
      accent: blue
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Usage Guide: guide.md
  - How It Works: architecture.md
  - Configuration: configuration.md
  - Reference:
      - reference/index.md
      - CLI: reference/cli.md
      - REST API: reference/rest-api.md
      - SSE Events: reference/sse-events.md
      - Job States: reference/job-states.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
  - Contributing:
      - contributing/index.md
      - Development: contributing/development.md
      - Project Structure: contributing/project-structure.md
      - Conventions: contributing/conventions.md
      - CI/CD: contributing/ci-cd.md
